<style>
/* ── CSS Variables ── */
:root {
  --bg-page:       #E8F0FE;
  --bg-card:       #FFFFFF;
  --bg-input:      #F8FAFF;
  --bg-result:     #F0F4FF;
  --bg-pw:         linear-gradient(135deg,#E8F5E9,#F1F8E9);
  --bg-chip:       #F5F5F5;
  --bg-clock:      rgba(21,101,192,0.10);
  --border:        #E3EAF6;
  --border-result: #C5CAE9;
  --border-pw:     #A5D6A7;
  --text-primary:  #1A237E;
  --text-secondary:#546E7A;
  --text-chip:     #424242;
  --text-label:    #1565C0;
  --text-chiplab:  #9E9E9E;
  --text-pw:       #2E7D32;
  --text-copy:     #7986CB;
  --header-bg:     linear-gradient(145deg,#0D47A1 0%,#1565C0 40%,#1976D2 100%);
  --header-text:   #ffffff;
  --header-sub:    rgba(255,255,255,0.70);
  --clock-text:    #1565C0;
  --clock-label:   #7986CB;
  --shadow:        0 8px 32px rgba(0,0,0,0.12);
  --btn-shadow:    0 4px 16px rgba(21,101,192,0.35);
  --toast-bg:      #323232;
  --toast-text:    #ffffff;
  --toggle-bg:     rgba(21,101,192,0.12);
}

[data-theme="dark"] {
  --bg-page:       #0A0E1A;
  --bg-card:       #141828;
  --bg-input:      #1A1F35;
  --bg-result:     #1A1F35;
  --bg-pw:         linear-gradient(135deg,#1B2E1B,#1F2E10);
  --bg-chip:       #1E2436;
  --bg-clock:      rgba(255,255,255,0.06);
  --border:        #2A3050;
  --border-result: #3949AB;
  --border-pw:     #388E3C;
  --text-primary:  #E8EAFF;
  --text-secondary:#90A4AE;
  --text-chip:     #CFD8DC;
  --text-label:    #7986CB;
  --text-chiplab:  #607D8B;
  --text-pw:       #81C784;
  --text-copy:     #7986CB;
  --header-bg:     linear-gradient(145deg,#080D1A 0%,#0D1530 40%,#0F1C40 100%);
  --header-text:   #E8EAFF;
  --header-sub:    rgba(200,210,255,0.55);
  --clock-text:    #9FA8DA;
  --clock-label:   #546E7A;
  --shadow:        0 8px 32px rgba(0,0,0,0.50);
  --btn-shadow:    0 4px 16px rgba(57,73,171,0.45);
  --toast-bg:      #E8EAFF;
  --toast-text:    #1A237E;
  --toggle-bg:     rgba(255,255,255,0.08);
}

/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg-page);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
  transition: background 0.3s;
}

/* ── Header ── */
.header {
  width: 100%;
  background: var(--header-bg);
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.30);
}
.header-icon {
  width: 42px; height: 42px;
  background: #FFD600;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.30);
  flex-shrink: 0;
}
.header-text { flex: 1; }
.header-text h1 { color: var(--header-text); font-size: 17px; font-weight: 700; }
.header-text p  { color: var(--header-sub); font-size: 11px; margin-top: 2px; }

/* ── Theme toggle button ── */
.theme-toggle {
  background: var(--toggle-bg);
  border: 1.5px solid rgba(255,255,255,0.20);
  border-radius: 20px;
  padding: 6px 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  color: var(--header-text);
  font-size: 13px; font-weight: 600;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.theme-toggle:active { opacity: 0.7; }
.theme-icon { font-size: 16px; line-height: 1; }

/* ── Clock bar ── */
.clock-bar {
  width: calc(100% - 32px); max-width: 460px;
  margin: 16px 0 0;
  display: flex; gap: 10px;
}
.clock-chip {
  flex: 1;
  background: var(--bg-clock);
  border-radius: 12px;
  padding: 10px 10px;
  transition: background 0.3s;
}
.clock-chip .cl { font-size: 9px; color: var(--clock-label); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
.clock-chip .cv { font-size: 13px; color: var(--clock-text); font-weight: 700; margin-top: 3px; font-family: 'Courier New', monospace; }

/* ── Card ── */
.card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 24px 20px;
  margin: 14px 16px 0;
  width: calc(100% - 32px);
  max-width: 460px;
  box-shadow: var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

/* ── Label ── */
label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: var(--text-label);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 7px;
}

/* ── Input / Select ── */
.input-wrap { position: relative; margin-bottom: 18px; }
input[type=text], select {
  width: 100%;
  padding: 13px 15px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  color: var(--text-primary);
  background: var(--bg-input);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
  appearance: none; -webkit-appearance: none;
}
input[type=text]:focus, select:focus {
  border-color: #5C6BC0;
  box-shadow: 0 0 0 3px rgba(92,107,192,0.18);
}
input[type=text]::placeholder { color: var(--text-chiplab); }

.select-wrap { position: relative; margin-bottom: 18px; }
.select-wrap::after {
  content: '▾';
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-label); font-size: 15px; pointer-events: none;
}
.select-wrap select { padding-right: 38px; cursor: pointer; }

/* ── Button ── */
.btn-generate {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #3949AB, #1976D2);
  color: #fff;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; letter-spacing: 0.4px;
  cursor: pointer;
  box-shadow: var(--btn-shadow);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-generate:active { transform: scale(0.97); }
.btn-generate:disabled { opacity: 0.6; }

/* ── Result card ── */
.result-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 22px 20px;
  margin: 14px 16px 0;
  width: calc(100% - 32px);
  max-width: 460px;
  box-shadow: var(--shadow);
  display: none;
  transition: background 0.3s;
}
.result-card.show { display: block; animation: slideUp 0.28s ease; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-section { margin-bottom: 16px; }
.result-section:last-child { margin-bottom: 0; }

.result-label {
  font-size: 10px; font-weight: 700; color: var(--text-chiplab);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.result-value {
  background: var(--bg-result);
  border: 1.5px solid var(--border-result);
  border-radius: 12px;
  padding: 13px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  transition: background 0.3s;
}
.result-value.password {
  background: var(--bg-pw);
  border-color: var(--border-pw);
}
.result-text {
  font-family: 'Courier New', monospace;
  font-size: 19px; font-weight: 700;
  color: var(--text-primary);
  word-break: break-all; flex: 1;
}
.result-value.password .result-text { color: var(--text-pw); font-size: 17px; }

.copy-btn {
  background: none; border: none; cursor: pointer;

  color: var(--text-copy); font-size: 20px;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;

.copy-btn:active { background: rgba(121,134,203,0.15); }
.copy-btn.copied { color: #43A047; }

/* ── Info row ── */
.info-row { display: flex; gap: 8px; margin-top: 14px; }
.info-chip {

.info-chip .chip-label { font-size: 9px; color: var(--text-chiplab); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.info-chip .chip-value { font-size: 12px; color: var(--text-chip); font-weight: 700; margin-top: 2px; }

/* ── Toast ── */
.toast {

  transform: translateX(-50%) translateY(80px);
  background: var(--toast-bg); color: var(--toast-text);
  padding: 11px 22px; border-radius: 22px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), background 0.3s;
  white-space: nowrap; z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────
(function initTheme() {
  // Mặc định: light. Dùng lại setting đã lưu nếu có.
  const saved = localStorage.getItem('gilikey-theme') || 'light';
  applyTheme(saved, false);
})();

function applyTheme(theme, animate = true) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon  = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  const meta  = document.getElementById('themeColorMeta');
  if (theme === 'dark') {
    if (icon)  icon.textContent  = '☀️';
    if (label) label.textContent = 'Light';
    if (meta)  meta.content      = '#080D1A';
  } else {
    if (icon)  icon.textContent  = '🌙';
    if (label) label.textContent = 'Dark';
    if (meta)  meta.content      = '#1565C0';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next    = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('gilikey-theme', next);
}

// ── Clock ─────────────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function updateClock() {
  const now = new Date();
  document.getElementById('localClock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('utcClock').textContent =
    `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}`;
  document.getElementById('minuteClock').textContent =
    Math.floor(now.getTime() / 60000);
}
setInterval(updateClock, 1000);
updateClock();

// ── Algorithm ─────────────────────────────────────────────────────────────
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function encodeForGUI(cltHex) {
  const plain  = cltHex + '0';
  const key    = 'vinsmartfuture';
  const cipher = new Uint8Array(plain.length);
  for (let i = 0; i < plain.length; i++)
    cipher[i] = plain.charCodeAt(i) ^ key.charCodeAt(i % key.length);
  let bin = '';
  cipher.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

async function generateGUIPassword(machineCode, timezone) {
  // Get current time in the selected timezone
  const now = new Date();
  const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
  const ts     = Math.floor(tzDate.getTime() / 1000);
  const minute = Math.floor(ts / 60);
  const input  = `${machineCode}:${minute}:30`;
  const hex    = await sha256Hex(input);
  const cltHex = hex.substring(0, 16);
  return { guiPw: encodeForGUI(cltHex), minute, ts, tzDate };
}

// ── Generate ──────────────────────────────────────────────────────────────
async function generate() {
  const mc       = document.getElementById('machineCode').value.trim().toLowerCase();
  const timezone = document.getElementById('hourOffset').value;
  const mcInput  = document.getElementById('machineCode');

  if (!mc) {
    mcInput.style.borderColor = '#E53935';
    mcInput.focus();
    setTimeout(() => mcInput.style.borderColor = '', 1200);
    return;
  }

  const btn = document.querySelector('.btn-generate');
  btn.innerHTML = '⏳ Generating...';
  btn.disabled  = true;

  try {
    const { guiPw, minute, ts, tzDate } = await generateGUIPassword(mc, timezone);
    document.getElementById('outMachine').textContent  = mc;
    document.getElementById('outPassword').textContent = guiPw;
    const tzLabel = document.getElementById('hourOffset').options[document.getElementById('hourOffset').selectedIndex].text;
    document.getElementById('infoOffset').textContent  = tzLabel;
    document.getElementById('infoMinute').textContent  = minute;
    // Show local time in selected timezone
    const tzName  = document.getElementById('hourOffset').value;
    const nowInTz = new Date().toLocaleString('en-US', { timeZone: tzName, hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('infoTime').textContent = nowInTz;
    const card = document.getElementById('resultCard');
    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } finally {
    btn.innerHTML = '<span>⚡</span> Generate Password';
    btn.disabled  = false;
  }
}

// ── Copy ──────────────────────────────────────────────────────────────────
function copyText(id, btn) {
  const text = document.getElementById(id).textContent;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => onCopied(btn))
      .catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;font-size:16px';
  document.body.appendChild(ta);
  ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); onCopied(btn); }
  catch(e) { showToast('Hãy giữ tay lên text để copy thủ công'); }
  document.body.removeChild(ta);
}

function onCopied(btn) {
  btn.textContent = '✓';
  btn.classList.add('copied');
  showToast('Đã copy vào clipboard!');
  setTimeout(() => { btn.textContent = '⧉'; btn.classList.remove('copied'); }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Enter key ─────────────────────────────────────────────────────────────
document.getElementById('machineCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
